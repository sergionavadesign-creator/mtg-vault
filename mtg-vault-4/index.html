    async function loadData() {

        const [{ data: profiles }, { data: cards }, { data: decks }, gamesRes] = await Promise.all([
          sb.from("profiles").select("*").order("created_at"),
          sb.from("cards").select("*").order("added_at"),

    // ── SCRYFALL ─────────────────────────────────────────────
    async function searchCard(query) {
      try {
        const r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(query)}`);
        if (r.ok) return await r.json();
        const s = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}&limit=1`);
        if (!s.ok) return null;
        const d = await s.json(); return d.data?.[0] || null;
      } catch { return null; }
    }

    // Cerca carte in italiano e inglese
    async function searchCardMulti(query) {
      try {
        const q = query.trim();
        if (!q) return [];

        // Cerca in parallelo: fuzzy inglese + ricerca diretta italiano
        const [fuzzy, itDirect] = await Promise.all([
          // Fuzzy inglese — trova nome Oracle anche da input italiano
          fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(q)}`)
            .then(r => r.ok ? r.json() : null).catch(() => null),
          // Ricerca diretta per nome italiano (usa include:multilingual per cercare anche nei nomi stampati)
          fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(q+" lang:it include:multilingual")}&unique=prints&order=released&limit=20`)
            .then(r => r.ok ? r.json() : {data:[]}).then(d => d.data||[]).catch(()=>[]),
        ]);

        // Raccogli tutti i nomi inglesi trovati
        const englishNames = new Set();
        if (fuzzy) englishNames.add(fuzzy.name);
        itDirect.forEach(c => englishNames.add(c.name)); // .name è sempre Oracle inglese

        if (englishNames.size === 0) return [];

        // Per ogni nome inglese, prendi TUTTE le stampe in tutte le lingue
        const allPrintsArrays = await Promise.all(
          [...englishNames].slice(0, 3).map(name =>
            fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent('!"'+name+'" lang:any')}&unique=prints&order=released&limit=40`)
              .then(r => r.ok ? r.json() : {data:[]}).then(d => d.data||[]).catch(()=>[])
          )
        );

        const prints = allPrintsArrays.flat();
        if (prints.length === 0) return fuzzy ? [fuzzy] : [];

        // Eredita prezzi dalle stampe inglesi dello stesso set
        const enPrints = prints.filter(c => c.lang === 'en');
        const priceBySet = {};
        enPrints.forEach(c => { if (c.prices?.eur || c.prices?.usd) priceBySet[c.set] = c.prices; });
        const refPrice = enPrints.find(c => c.prices?.eur || c.prices?.usd)?.prices;

        const withPrices = prints.map(c => {
          if (cardPrice(c) > 0) return c;
          if (priceBySet[c.set]) return { ...c, prices: priceBySet[c.set] };
          if (refPrice) return { ...c, prices: refPrice };
          return c;
        });

        // Deduplica
        const seen = new Set();
        const deduped = withPrices.filter(c => {
          const key = c.set+c.collector_number+c.lang;
          if (seen.has(key)) return false;
          seen.add(key); return true;
        });

        // Ordina: italiano prima, poi inglese, poi altre lingue
        const italian = deduped.filter(c => c.lang === 'it');
        const english = deduped.filter(c => c.lang === 'en');
        const others = deduped.filter(c => c.lang !== 'it' && c.lang !== 'en');

        return [...italian, ...english, ...others];
      } catch { return []; }
    }

    async function searchByCode(setCode, number) {
      try {
        const r = await fetch(`https://api.scryfall.com/cards/${setCode.toLowerCase()}/${number}`);
        return r.ok ? await r.json() : null;
      } catch { return null; }
    }
    // Prezzo: usa EUR se disponibile, fallback USD, fallback 0
    // Per stampe non-inglesi Scryfall spesso non ha il prezzo — mostriamo N/D invece di 0
    function cardPrice(c) {
      const eur = parseFloat(c?.prices?.eur || 0);
      const usd = parseFloat(c?.prices?.usd || 0);
      return eur || usd || 0;
    }
    function cardPriceDisplay(c) {
      const p = cardPrice(c);
      return p > 0 ? "€"+p.toFixed(2) : "N/D";
    }
    // Come cardPrice, ma usa il prezzo Foil se la carta della collezione è marcata come tale
    function ownedCardPrice(c) {
      if (c?.foil) {
        const eurF = parseFloat(c?.prices?.eur_foil || 0);
        const usdF = parseFloat(c?.prices?.usd_foil || 0);
        if (eurF || usdF) return eurF || usdF;
      }
      return cardPrice(c);
    }
    function ownedCardPriceDisplay(c) {
      const p = ownedCardPrice(c);
      return p > 0 ? "€"+p.toFixed(2) : "N/D";
    }
    const cardImage = c => c?.image_uris?.normal || c?.card_faces?.[0]?.image_uris?.normal || null;
    const cardLegality = (c, f) => {
      const l = c?.legalities?.[f.toLowerCase()];
      return l==="legal"?"✅":l==="banned"?"🚫":l==="restricted"?"⚠️":"❌";
    };

    // Alias multilingua delle terre base: garantisce il riconoscimento
    // (es. Palude = Swamp) anche se il nome salvato non è quello inglese Oracle
    const BASIC_LAND_ALIASES = {
      "foresta":"forest", "wald":"forest", "forêt":"forest", "bosque":"forest", "floresta":"forest", "森":"forest",
      "isola":"island", "insel":"island", "île":"island", "isla":"island", "ilha":"island", "島":"island",
      "montagna":"mountain", "berg":"mountain", "montagne":"mountain", "montaña":"mountain", "montanha":"mountain", "山":"mountain",
      "palude":"swamp", "sumpf":"swamp", "marais":"swamp", "pantano":"swamp", "沼":"swamp",
      "pianura":"plains", "ebene":"plains", "plaine":"plains", "llanura":"plains", "planície":"plains", "planicie":"plains", "平地":"plains",
      "distese":"wastes", "einöde":"wastes", "étendues":"wastes",
    };
    function canonicalCardName(name) {
      const key = (name||"").trim().toLowerCase();
      return BASIC_LAND_ALIASES[key] || key;
    }
    // Regola base di Magic: solo creature leggendarie (o planeswalker leggendari
    // abilitati) possono essere comandanti. Approssimazione ragionevole senza
    // dover leggere il testo oracle completo.
    function canBeCommander(card) {
      const t = (card?.type||"").toLowerCase();
      const isLegendaryCreature = t.includes("legendary") && t.includes("creature");
      const explicitlyAllowed = (card?.oracleText||"").toLowerCase().includes("can be your commander");
      return isLegendaryCreature || explicitlyAllowed;
    }

    const BASIC_LAND_NAMES = new Set(["forest","island","mountain","swamp","plains","wastes"]);
    // Controlli di base sulle regole del formato (non sostituisce un giudice, ma segnala le violazioni più comuni)
    function validateDeckRules(deck, cards) {
      const warnings = [];
      if (!deck || !cards.length) return warnings;
      const fmt = deck.format;
      const nonBasic = cards.filter(c => !BASIC_LAND_NAMES.has(canonicalCardName(c.name)));
      if (fmt === "Commander") {
        const total = cards.reduce((s,c)=>s+(c.qty||1),0);
        if (total !== 100) warnings.push(`Il mazzo ha ${total} carte: in Commander dovrebbero essere esattamente 100 (99 + comandante).`);
        const dupes = nonBasic.filter(c => (c.qty||1) > 1);
        if (dupes.length) warnings.push(`Regola singleton: ${dupes.map(c=>c.printed_name||c.name).join(", ")} ${dupes.length>1?"hanno":"ha"} più di una copia.`);
        const commander = cards.find(c=>c.isCommander);
        if (!commander) warnings.push("Nessun comandante designato per questo mazzo.");
        else {
          const identity = new Set(commander.colorIdentity || commander.colors || []);
          // Se non conosciamo l'identità del comandante (dati mancanti), non facciamo il controllo
          // invece di segnalare per errore ogni carta colorata come "fuori identità"
          if (identity.size > 0) {
            const offColor = nonBasic.filter(c => c.id!==commander.id && (c.colorIdentity || c.colors || []).some(col => !identity.has(col)));
            if (offColor.length) warnings.push(`Fuori identità cromatica del comandante: ${offColor.map(c=>c.printed_name||c.name).join(", ")}.`);
          }
        }
      } else if (["Standard","Pioneer","Modern","Legacy"].includes(fmt)) {
        const over4 = nonBasic.filter(c => (c.qty||1) > 4);
        if (over4.length) warnings.push(`Limite 4 copie superato: ${over4.map(c=>`${c.printed_name||c.name} (${c.qty}×)`).join(", ")}.`);
      }
      return warnings;
    }

    // ── SEARCH MODAL ─────────────────────────────────────────
    function ScanModal({ onClose, onFound }) {
      const [scanning, setScanning] = useState(false);
      const [status, setStatus] = useState("");
      const [manualName, setManualName] = useState("");
      const [results, setResults] = useState([]); // lista risultati multipli
      const [resultFilter, setResultFilter] = useState("");
      const [filterYear, setFilterYear] = useState("All");
      const [filterLang, setFilterLang] = useState("All");
      const [filterSet, setFilterSet] = useState("All");
      const [showFilters, setShowFilters] = useState(false);
      const [hideCrossover, setHideCrossover] = useState(true);
      const [suggestions, setSuggestions] = useState([]); // autocomplete
      const [showSugg, setShowSugg] = useState(false);
      const [listening, setListening] = useState(false);
      const debounceRef = useRef(null);
      const recognizerRef = useRef(null);

      function startVoice() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setStatus("Riconoscimento vocale non supportato da questo browser"); return; }
        if (listening) { recognizerRef.current?.stop(); setListening(false); return; }
        const rec = new SR();
        rec.lang = "it-IT";
        rec.interimResults = false;
        rec.maxAlternatives = 3;
        rec.onstart = () => setListening(true);
        rec.onend = () => setListening(false);
        rec.onerror = () => { setListening(false); setStatus("Errore microfono — riprova"); };
        rec.onresult = (e) => {
          const transcript = e.results[0][0].transcript.trim();
          setManualName(transcript);
          setStatus("");
          setSuggestions([]);
          setTimeout(() => doManualSearch(transcript), 100);
        };
        recognizerRef.current = rec;
        rec.start();
      }

      // Autocomplete: cerca SEMPRE in italiano e inglese insieme
      function handleTypeahead(val) {
        setManualName(val);
        setSuggestions([]);
        setShowSugg(false);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        if (val.trim().length < 2) return;
        debounceRef.current = setTimeout(async () => {
          try {
            const [itRes, enRes] = await Promise.all([
              fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent('name:'+val+' lang:it')}&unique=names&limit=10`)
                .then(r => r.ok ? r.json() : { data: [] }).then(d => d.data || []).catch(() => []),
              fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(val)}&include_extras=false`)
                .then(r => r.ok ? r.json() : { data: [] }).then(d => d.data || []).catch(() => []),
            ]);
            const itNames = itRes.map(c => c.printed_name || c.name).filter(Boolean);
            const names = [...new Set([...itNames, ...enRes])].slice(0, 8);
            if (names.length) { setSuggestions(names); setShowSugg(true); }
          } catch {}
        }, 280);
      }

      function pickSuggestion(name) {
        setManualName(name);
        setSuggestions([]);
        setShowSugg(false);
        setTimeout(() => doManualSearch(name), 50);
      }

      async function doManualSearch(name) {
        const q = (name || manualName).trim();
        if (!q) return;
        setScanning(true); setResults([]); setShowSugg(false); setStatus("Cercando…");
        const cards = await searchCardMulti(q);
        if (cards.length===1) { onFound(cards[0]); }
        else if (cards.length>1) { setResults(cards); setStatus(`${cards.length} edizioni trovate — scegli quella che hai:`); }
        else { setStatus("Nessuna carta trovata. Controlla il nome."); }
        setScanning(false);
      }
      const manualSearch = () => doManualSearch(manualName);

      function pickCard(card) {
        onFound(card);
      }

      return (
        <div style={S.modalOverlay} onClick={onClose}>
          <div style={{...S.modalBox, maxHeight:"90vh", overflowY:"auto"}} onClick={e => e.stopPropagation()} className="fade-in">
            <div style={S.modalHeader}>
              <span style={{fontWeight:700}}>🔍 Cerca carta</span>
              <button style={S.btnGhost} onClick={onClose}>✕</button>
            </div>

            {/* Search bar con autocomplete e voce */}
            <div style={{position:"relative"}}>
              <div style={{display:"flex", gap:6}}>
                <input style={{...S.inp, flex:1, minWidth:0}}
                  placeholder="Scrivi o ditta il nome carta…"
                  value={manualName}
                  onChange={e => { handleTypeahead(e.target.value); setResults([]); setStatus(""); }}

    const COLOR_LABELS = { W:"⚪ Bianco", U:"🔵 Blu", B:"⚫ Nero", R:"🔴 Rosso", G:"🟢 Verde" };
    function CollectionStats({ collection, ownedCardPrice }) {
      const byRarity = {};
      const byColor = { W:0, U:0, B:0, R:0, G:0, C:0 };
      const bySet = new Set();
      collection.forEach(c => {
        byRarity[c.rarity||"?"] = (byRarity[c.rarity||"?"]||0) + c.qty;
        if (c.setCode) bySet.add(c.setCode);
        if (!c.colors || c.colors.length===0) byColor.C += c.qty;
        else c.colors.forEach(col => { if (byColor[col]!==undefined) byColor[col] += c.qty; });
      });
      const top5 = [...collection]
        .map(c => ({ ...c, totalValue: ownedCardPrice(c)*c.qty }))
        .sort((a,b) => b.totalValue - a.totalValue)
        .slice(0, 5);

      return (
        <div style={S.panel} className="fade-in">
          <div style={S.pt}>Per rarità</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {Object.entries(byRarity).map(([r,n]) => (
              <span key={r} style={S.legPip}>{r}: {n}</span>
            ))}
          </div>
          <div style={S.pt}>Per colore</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {Object.entries(byColor).filter(([,n])=>n>0).map(([col,n]) => (
              <span key={col} style={S.legPip}>{col==="C"?"⬜ Incolore":COLOR_LABELS[col]}: {n}</span>
            ))}
          </div>
          <div style={S.pt}>Set diversi posseduti</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:16}}>{bySet.size}</div>
          <div style={S.pt}>Le 5 carte più preziose</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {top5.map(c => (
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid #1e1b2e"}}>
                <span>{c.printed_name||c.name} {c.foil&&"✨"} ×{c.qty}</span>
                <span style={{color:"#f59e0b",fontWeight:700}}>€{c.totalValue.toFixed(2)}</span>
              </div>
            ))}
            {top5.length===0 && <div style={{fontSize:12,color:"#64748b"}}>Nessuna carta ancora.</div>}
          </div>
        </div>
      );
    }

      const [savingAiDeck, setSavingAiDeck] = useState(false);

      const persist = useCallback(d => { setData(d); saveLocalData(d); }, []);

      const activeProfile = data.profiles.find(p => p.id === activeProfileId);
      const collection = activeProfile?.cards || [];
      const currentDeck = data.decks.find(d => d.id === activeDeck);

      // Profile management
      async function createProfile(name, avatar) {
        const p = { id: crypto.randomUUID(), name, avatar, cards: [] };
        const saved = await saveProfile(p);
        const newData = { ...data, profiles: [...data.profiles, { ...p, ...saved }] };
        persist(newData);
      }
      async function handleDeleteProfile(id) {
        if (!confirm("Eliminare questo profilo e tutte le sue carte?")) return;
        await deleteProfile(id);
        persist({ ...data, profiles: data.profiles.filter(p => p.id !== id), decks: data.decks.filter(d => d.ownerId !== id) });
      }

      // Card management
      async function addCard(card, condition, qty, foil) {
        const newCard = {
          id: crypto.randomUUID(), scryfallId:card.id, name:card.name, printed_name:card.printed_name||null,
          set:card.set_name, setCode:card.set, collectorNumber:card.collector_number,
          rarity:card.rarity, manaCost:card.mana_cost||"", colors:card.colors||[], colorIdentity:card.color_identity||[], oracleText:card.oracle_text||card.card_faces?.[0]?.oracle_text||"",
          type:card.type_line||"", legalities:card.legalities||{}, prices:card.prices||{},
          image:cardImage(card), condition, qty, foil:!!foil, addedAt:new Date().toISOString()
        };
        await saveCard(newCard, activeProfileId);
        const u = { ...data, profiles: data.profiles.map(p =>
          p.id===activeProfileId ? { ...p, cards: [...(p.cards||[]), newCard] } : p
        )};
        persist(u); setConfirmCard(null); setShowScan(false);
      }

      async function removeCard(id) {
        await deleteCard(id);
        const u = { ...data, profiles: data.profiles.map(p =>
          p.id===activeProfileId ? { ...p, cards: (p.cards||[]).filter(c => c.id!==id) } : p
        )};
        persist(u); setSelectedCard(null);
      }

      async function updateQty(id, delta) {
        const profile = data.profiles.find(p => p.id===activeProfileId);
        const card = profile?.cards?.find(c => c.id===id);
        if (!card) return;
        const newQty = (card.qty||1) + delta;
        if (newQty < 1) { await removeCard(id); return; }
        const updatedCard = { ...card, qty: newQty };
        await saveCard(updatedCard, activeProfileId);
        const u = { ...data, profiles: data.profiles.map(p => {
          if (p.id!==activeProfileId) return p;
          return { ...p, cards: (p.cards||[]).map(c => c.id===id ? updatedCard : c) };
        })};
        persist(u);
      }

      const filteredCollection = collection.filter(c => {
        const mt = !filterText || (c.name.toLowerCase().includes(filterText.toLowerCase()) || (c.printed_name||"").toLowerCase().includes(filterText.toLowerCase()));
        const mf = filterFormat==="All" || c.legalities?.[filterFormat.toLowerCase()]==="legal";
        return mt && mf;
      });
      const totalValue = collection.reduce((s,c) => s+ownedCardPrice(c)*c.qty, 0);

      // Deck management
      async function createDeck() {
        if (!deckName.trim()) return;
        const deck = { id:crypto.randomUUID(), name:deckName, format:deckFormat, cards:[], ownerId:activeProfileId };
        await saveDeck(deck);
        persist({ ...data, decks: [...data.decks, deck] });
        setDeckName(""); setActiveDeck(deck.id); setDeckView("build");
      }
      // Esegue davvero la modifica sul mazzo indicato (usata sia per l'originale che per una copia)
      async function executeDeckAction(deckId, action) {
        const u = { ...data };
        const deck = u.decks.find(d => d.id===deckId); if (!deck) return;
        if (action.type==="addCard") {
          const card = action.card;
          const ex = deck.cards.find(c => c.scryfallId===card.scryfallId);
          if (ex) ex.qty=(ex.qty||1)+1; else deck.cards.push({...card,qty:1});
        } else if (action.type==="removeCard") {
          deck.cards = deck.cards.filter(c => c.id!==action.cardId);
        } else if (action.type==="toggleCommander") {
          const makingCommander = !deck.cards.find(c=>c.id===action.cardId)?.isCommander;
          deck.cards = deck.cards.map(c => ({ ...c, isCommander: c.id===action.cardId ? makingCommander : false }));
        }
        await saveDeck(deck);
        persist(u);
      }

      // Se il mazzo è importato (es. da Moxfield), chiede se modificare l'originale
      // o crearne una copia prima di applicare la modifica; altrimenti procede/chiede conferma normale
      function guardedDeckAction(deck, action, confirmMessage) {
        if (deck.isImported) {
          setPendingAction({ ...action, deckId: deck.id, deckName: deck.name });
          return;
        }
        if (confirmMessage && !confirm(confirmMessage)) return;
        executeDeckAction(deck.id, action);
      }

      async function forkDeckAndApply(newName) {
        if (!pendingAction) return;
        const original = data.decks.find(d => d.id===pendingAction.deckId);
        if (!original) { setPendingAction(null); return; }
        const copy = {
          id: crypto.randomUUID(),
          name: (newName||"").trim() || `${original.name} (copia)`,
          format: original.format,
          ownerId: original.ownerId,
          isImported: false,
          cards: original.cards.map(c => ({ ...c, id: crypto.randomUUID() }))
        };
        // Rimappa l'id carta dell'azione pendente sul nuovo id nella copia (stessa posizione)
        const idx = original.cards.findIndex(c => c.id === pendingAction.cardId);

      // ── IMPORTA COLLEZIONE DA CSV ──────────────────────────
      function parseCsv(text) {
        const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return [];
        const splitLine = l => {
          const out = []; let cur = ""; let inQ = false;
          for (let i=0; i<l.length; i++) {
            const ch = l[i];
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { out.push(cur); cur = ""; }
            else cur += ch;
          }
          out.push(cur);
          return out.map(s => s.trim().replace(/^"|"$/g,""));
        };
        const headers = splitLine(lines[0]).map(h => h.toLowerCase());
        const idx = key => headers.findIndex(h => h.includes(key));
        const nameIdx = idx("name");
        const countIdx = headers.findIndex(h => h==="count" || h==="quantity" || h.includes("qty"));
        const setIdx = idx("edition") >= 0 ? idx("edition") : idx("set");
        const foilIdx = idx("foil");
        const condIdx = idx("condition");
        if (nameIdx < 0) return [];
        return lines.slice(1).map(l => {
          const cols = splitLine(l);
          return {
            name: cols[nameIdx]||"",
            qty: parseInt(cols[countIdx]) || 1,
            set: setIdx>=0 ? cols[setIdx] : "",
            foil: foilIdx>=0 ? /foil/i.test(cols[foilIdx]||"") : false,
            condition: condIdx>=0 ? (cols[condIdx]||"NM").slice(0,2).toUpperCase() : "NM"
          };
        }).filter(r => r.name);
      }

      async function importCsv() {
        const rows = parseCsv(csvText);
        if (rows.length===0) { setCsvResult("Nessuna riga valida trovata. Assicurati che il CSV abbia una colonna 'Name'."); return; }
        setCsvImporting(true); setCsvResult(`Importazione di ${rows.length} righe in corso…`);
        const scryMap = {};
        const identifiers = rows.map(r => r.set ? { name: r.name, set: r.set } : { name: r.name });
        const chunks = [];
        for (let i=0; i<identifiers.length; i+=75) chunks.push(identifiers.slice(i,i+75));
        for (const chunk of chunks) {
          try {
            const res = await fetch("https://api.scryfall.com/cards/collection", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ identifiers: chunk })
            });
            if (res.ok) {
              const dd = await res.json();
              (dd.data||[]).forEach(c => { scryMap[c.name.toLowerCase()] = c; });
            }
          } catch {}
        }
        let added = 0, missed = [];
        const newCards = [];
        for (const row of rows) {
          const sc = scryMap[row.name.toLowerCase()];
          if (!sc) { missed.push(row.name); continue; }
          const newCard = {
            id: crypto.randomUUID(), scryfallId:sc.id, name:sc.name, printed_name:sc.printed_name||null,
            set:sc.set_name, setCode:sc.set, collectorNumber:sc.collector_number,
            rarity:sc.rarity, manaCost:sc.mana_cost||"", colors:sc.colors||[], colorIdentity:sc.color_identity||[], oracleText:sc.oracle_text||sc.card_faces?.[0]?.oracle_text||"",
            type:sc.type_line||"", legalities:sc.legalities||{}, prices:sc.prices||{},
            image:cardImage(sc), condition:row.condition, qty:row.qty, foil:row.foil, addedAt:new Date().toISOString()
          };
          await saveCard(newCard, activeProfileId);
          newCards.push(newCard);
          added++;
        }
        const u = { ...data, profiles: data.profiles.map(p =>
          p.id===activeProfileId ? { ...p, cards: [...(p.cards||[]), ...newCards] } : p
        )};
        persist(u);
        setCsvResult(`Importate ${added} carte su ${rows.length}.` + (missed.length ? ` Non trovate: ${missed.slice(0,10).join(", ")}${missed.length>10?"…":""}` : ""));
        setCsvImporting(false);
      }

        if (m) return m[1];
        // se l'utente incolla direttamente l'ID pubblico
        if (!s.includes("/") && !s.includes(" ")) return s;
        return null;

        setMoxError(""); setMoxPreview(null);

        if (!publicId) { setMoxError("Incolla un link Moxfield valido (es. https://moxfield.com/decks/xxxxx)"); return; }
        setMoxLoading(true);
        try {

            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          });
          const d = await r.json();
          if (!r.ok || d.error) throw new Error(d.error || "Mazzo non trovato o non pubblico");

          const boards = ["mainboard", "commanders", "companions", "sideboard"];
          const entries = [];
          boards.forEach(b => {
            const board = d[b] || {};
            Object.values(board).forEach(entry => {
              const c = entry.card || {};
              entries.push({
                name: c.name || entry.name,
                quantity: entry.quantity || 1,
                scryfallId: c.scryfall_id || c.scryfallId || null,
                board: b
              });
            });
          });
          if (entries.length === 0) throw new Error("Il mazzo sembra vuoto o non pubblico.");

          const formatMap = { commander:"Commander", standard:"Standard", pioneer:"Pioneer", modern:"Modern", legacy:"Legacy", vintage:"Vintage", pauper:"Pauper" };
          const guessedFormat = formatMap[(d.format||"").toLowerCase()] || "Commander";
          setMoxFormat(guessedFormat);
          setMoxPreview({ name: d.name || "Mazzo importato", entries, cardCount: entries.reduce((s,e)=>s+e.quantity,0) });
        } catch(e) {
          setMoxError(e.message || "Errore nel recupero del mazzo da Moxfield.");
        }
        setMoxLoading(false);
      }

        try {
          // Recupera i dati completi da Scryfall in blocchi da 75 (batch collection endpoint)
          const identifiers = moxPreview.entries.map(e => e.scryfallId ? { id: e.scryfallId } : { name: e.name });
          const chunks = [];
          for (let i=0; i<identifiers.length; i+=75) chunks.push(identifiers.slice(i,i+75));
          const scryMap = {}; // nome lowercase -> card scryfall
          for (const chunk of chunks) {
            const res = await fetch("https://api.scryfall.com/cards/collection", {
              method:"POST", headers:{"Content-Type":"application/json"},
              body: JSON.stringify({ identifiers: chunk })
            });
            if (res.ok) {
              const dd = await res.json();
              (dd.data||[]).forEach(c => { scryMap[c.name.toLowerCase()] = c; });
            }
          }

          // Somma le quantità possedute per nome canonico (invariante tra lingue/edizioni,
          // con alias terre base: una Foresta italiana e un Forest inglese sono la stessa carta)
          const ownedByName = {};
          collection.forEach(oc => {
            const keys = new Set([canonicalCardName(oc.name), canonicalCardName(oc.printed_name)].filter(Boolean));
            keys.forEach(key => { ownedByName[key] = (ownedByName[key]||0) + (oc.qty||1); });
          });

          const deckCardsList = moxPreview.entries.map(e => {
            const sc = scryMap[(e.name||"").toLowerCase()];
            const canonicalName = canonicalCardName(sc?.name || e.name || "");
            const ownedQty = ownedByName[canonicalName] || 0;
            return {
              id: crypto.randomUUID(),
              scryfallId: sc?.id || null,
              name: sc?.name || e.name,
              printed_name: null,
              set: sc?.set_name || "", setCode: sc?.set || "",
              collectorNumber: sc?.collector_number || "",
              rarity: sc?.rarity || "",
              manaCost: sc?.mana_cost || "", colors: sc?.colors || [], colorIdentity: sc?.color_identity || [], oracleText: sc?.oracle_text || sc?.card_faces?.[0]?.oracle_text || "",
              type: sc?.type_line || "", legalities: sc?.legalities || {}, prices: sc?.prices || {},
              image: sc ? cardImage(sc) : null,
              qty: e.quantity,
              owned: ownedQty >= e.quantity,
              ownedQty,
              imported: true,
              isCommander: e.board === "commanders",
              isSideboard: e.board === "sideboard"
            };
          });

          const deck = { id: crypto.randomUUID(), name: moxPreview.name, format: moxFormat, cards: deckCardsList, ownerId: activeProfileId, isImported: true };
          await saveDeck(deck);
          persist({ ...data, decks: [...data.decks, deck] });
          setMoxPreview(null); setMoxUrl(""); setActiveDeck(deck.id); setDeckView("build");
        } catch(e) {
          setMoxError("Errore durante l'importazione. Riprova.");
        }
        setMoxImporting(false);
      }

      // ── TROVA IL PREZZO MIGLIORE ──────────────────────────
      async function findBestPrice(card) {
        setPriceCard(card); setPriceInfo(null); setPriceError(""); setPriceLoading(true);
        try {
          let c = null;
          if (card.scryfallId) {
            const r = await fetch(`https://api.scryfall.com/cards/${card.scryfallId}`);
            if (r.ok) c = await r.json();
          }
          if (!c) {
            const r2 = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(card.name)}`);
            if (r2.ok) c = await r2.json();
          }
          if (!c) throw new Error("Carta non trovata su Scryfall.");
          setPriceInfo({
            prices: c.prices || {},
            purchase_uris: c.purchase_uris || {}
          });
        } catch(e) {
          setPriceError(e.message || "Impossibile recuperare i prezzi.");
        }
        setPriceLoading(false);
      }

      function renderCardDetailBody(card) {
        return (
          <>

            <div style={S.dMeta}>{card.type}</div>

            <div style={S.dMeta}>Cond: <b>{CONDITION_LABELS[card.condition]}</b> · Qtà: <b>{card.qty}</b>{card.foil && <b style={{color:"#f59e0b"}}> · ✨ Foil</b>}</div>
            <div style={S.dMeta}>Valore: <b style={{color:"#f59e0b"}}>{ownedCardPrice(card)>0 ? "€"+(ownedCardPrice(card)*card.qty).toFixed(2) : "N/D"}</b></div>
            <div style={S.legGrid}>
              {FORMATS.map(f=>(
                <div key={f} style={{textAlign:"center",fontSize:10}}>
                  <div>{cardLegality(card,f)}</div>
                  <div style={{color:"#64748b"}}>{f.slice(0,4)}</div>
                </div>
              ))}
            </div>
            <button style={S.btnExplain} onClick={e=>{e.stopPropagation();explainCardFn(card);}}>💬 Spiega questa carta</button>
            <button style={S.btnPrice} onClick={e=>{e.stopPropagation();findBestPrice(card);}}>🛒 Trova il prezzo migliore</button>
            <button style={S.btnDel} onClick={()=>removeCard(card.id)}>🗑 Rimuovi</button>
          </>
        );
      }

      function renderAdvisor(text) {
        return text.split("\n").map((line, i) => {
          if (line.startsWith("**") && line.endsWith("**"))
            return <div key={i} style={S.aH2}>{line.replace(/\*\*/g,"")}</div>;
          if (line.match(/^[-•]\s/)) {
            const url = line.match(/https?:\/\/\S+/)?.[0];
            const clean = line.replace(/https?:\/\/\S+/,"").replace(/^[-•]\s/,"").trim();
            return <div key={i} style={S.aLi}>▸ {clean} {url&&<a href={url} target="_blank" rel="noopener noreferrer">🛒 Cardmarket</a>}</div>;
          }
          return line.trim() ? <p key={i} style={S.aP}>{line}</p> : <br key={i}/>;
        });
      }

      // ── PROFILE SCREEN ──

                <div style={S.modalHeader}>

                  <select style={S.sel} value={filterFormat} onChange={e=>setFilterFormat(e.target.value)}>

                          <div style={S.tileMeta}>{card.condition}{card.foil && " · ✨"}</div>
                          <div style={{fontSize:13,fontWeight:700,color:"#f59e0b",marginBottom:6}}>€{ownedCardPrice(card).toFixed(2)}{card.foil && " ✨"}</div>

                        else deckStats[p.deckName].losses++;
                      }));
                      const entries = Object.entries(deckStats);
                      return entries.length>0 ? (
                        <div style={S.panel}>
                          <div style={S.pt}>Statistiche per mazzo</div>
                          {entries.map(([name,s])=>(
                            <div key={name} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0"}}>
                              <span>{name}</span>
                              <span><span style={{color:"#34d399"}}>{s.wins}V</span> — <span style={{color:"#f87171"}}>{s.losses}S</span></span>
                            </div>
                          ))}
                        </div>
                      ) : null;
                    })()}
                    {(!data.games || data.games.length===0) && (
                      <div style={S.empty}><div style={{fontSize:36,marginBottom:10}}>📜</div>Nessuna partita registrata ancora.</div>
                    )}
                    {(data.games||[]).map(g => (
                      <div key={g.id} style={S.panel}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                          <span style={{fontSize:12,color:"#64748b"}}>{g.created_at ? new Date(g.created_at).toLocaleDateString("it-IT") : ""} · {g.format}</span>
                          <button style={S.btnMini} onClick={()=>handleDeleteGame(g.id)}>🗑</button>
                        </div>
                        {g.players.map((p,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0",
                            fontWeight:g.winnerName===p.name?700:400,color:g.winnerName===p.name?"#f59e0b":"#e2e8f0"}}>
                            <span>{g.winnerName===p.name?"🏆 ":""}{p.name}{p.deckName?` (${p.deckName})`:""}</span>
                            <span>{p.finalLife} vita{p.poison>0?` · ☠️${p.poison}`:""}</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </>
                )}

                {showWinnerPicker && (
                  <div style={S.modalOverlay} onClick={()=>setShowWinnerPicker(false)}>
                    <div style={S.modalBox} onClick={e=>e.stopPropagation()} className="fade-in">
                      <div style={S.modalHeader}>
                        <span style={{fontWeight:700}}>🏆 Chi ha vinto?</span>
                        <button style={S.btnGhost} onClick={()=>setShowWinnerPicker(false)}>✕</button>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {livePlayers?.map(p=>(
                          <button key={p.id} style={{...S.btnP,padding:12}} onClick={()=>finalizeMatch(p.id)}>{p.name}</button>
                        ))}
                        <button style={{...S.btnGhost,padding:12}} onClick={()=>finalizeMatch(null)}>Nessuno / pareggio</button>
                      </div>
                    </div>
                  </div>
                )}

                {tableMode && livePlayers && (() => {
                  const n = livePlayers.length;
                  const cols = n>2 ? 2 : 1;
                  const rows = Math.ceil(n/cols);
                  return (
                    <div style={S.tableModeWrap}>
                      <div style={{...S.tableGrid, gridTemplateColumns:`repeat(${cols},1fr)`, gridTemplateRows:`repeat(${rows},1fr)`}}>
                        {livePlayers.map((p,i) => {
                          const rotated = i < n/2;
                          return (
                            <div key={p.id} style={{...S.tableCell, transform: rotated?"rotate(180deg)":"none",
                              ...(isPlayerKO(p)?{opacity:.45}:{}),
                              ...(p.bgImage?{backgroundImage:`linear-gradient(rgba(10,10,15,.5),rgba(10,10,15,.8)), url(${p.bgImage})`,backgroundSize:"cover",backgroundPosition:"center"}:{})}}>
                              {isPlayerKO(p) && <div style={S.koBadge}>☠️ ELIMINATO</div>}
                              <button style={S.tableBgBtn} onClick={()=>setBgPickerFor(p.id)}>🖼️</button>
                              <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{p.name}</div>
                              {p.deckName && <div style={{fontSize:10,color:"#94a3b8",marginBottom:6}}>{p.deckName}</div>}
                              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                                <button style={S.lifeBtn} onClick={()=>adjustLife(p.id,-1)}>−</button>
                                <div style={{fontSize:36,fontWeight:800,minWidth:60,textAlign:"center",color:p.life<=10?"#f87171":"#f8fafc"}}>{p.life}</div>
                                <button style={S.lifeBtn} onClick={()=>adjustLife(p.id,1)}>+</button>
                              </div>
                              {trackPoison && (
                                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                                  <span style={{color:"#34d399"}}>☠️ {p.poison}</span>
                                  <button style={S.btnMini} onClick={()=>adjustPoison(p.id,-1)}>−</button>
                                  <button style={S.btnMini} onClick={()=>adjustPoison(p.id,1)}>+</button>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                      <button style={S.tableExitBtn} onClick={()=>setTableMode(false)}>✕ Esci dalla modalità tavolo</button>
                    </div>
                  );
                })()}

                {matchSettingsOpen && (
                  <div style={S.modalOverlay} onClick={()=>{setMatchSettingsOpen(false);setDiceResult(null);}}>
                    <div style={S.modalBox} onClick={e=>e.stopPropagation()} className="fade-in">
                      <div style={S.modalHeader}>
                        <span style={{fontWeight:700}}>⚙️ Impostazioni partita</span>
                        <button style={S.btnGhost} onClick={()=>{setMatchSettingsOpen(false);setDiceResult(null);}}>✕</button>
                      </div>

                      <label style={{fontSize:12,color:"#94a3b8",display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <input type="checkbox" checked={autoKO} onChange={e=>setAutoKO(e.target.checked)} />
                        ☠️ Auto-KO (0 vita, 10 veleno o 21 danno comandante)
                      </label>
                      <label style={{fontSize:12,color:"#94a3b8",display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                        <input type="checkbox" checked={turnTimerEnabled} onChange={e=>setTurnTimerEnabled(e.target.checked)} />
                        ⏱️ Mostra timer del turno
                      </label>

                      <div style={S.pt}>Giocatore iniziale</div>
                      <button style={{...S.btnGhost,width:"100%",marginBottom:16}} onClick={pickRandomStarter}>🎯 Scegli a caso chi inizia</button>

                      <div style={S.pt}>Dadi e moneta</div>
                      <div style={{display:"flex",gap:8,marginBottom:12}}>
                        <button style={{...S.btnGhost,flex:1}} onClick={()=>rollDice(6)}>🎲 D6</button>
                        <button style={{...S.btnGhost,flex:1}} onClick={()=>rollDice(20)}>🎲 D20</button>
                        <button style={{...S.btnGhost,flex:1}} onClick={rollCoin}>🪙 Moneta</button>
                      </div>
                      {diceResult && (
                        <div style={{textAlign:"center",fontSize:22,fontWeight:800,padding:"14px 0",color:"#f59e0b"}}>{diceResult}</div>
                      )}
                    </div>
                  </div>
                )}

                {bgPickerFor && (() => {
                  const player = livePlayers?.find(p=>p.id===bgPickerFor);
                  return (
                    <div style={S.modalOverlay} onClick={()=>setBgPickerFor(null)}>
                      <div style={{...S.modalBox,maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()} className="fade-in">
                        <div style={S.modalHeader}>
                          <span style={{fontWeight:700}}>🖼️ Sfondo per {player?.name}</span>
                          <button style={S.btnGhost} onClick={()=>setBgPickerFor(null)}>✕</button>
                        </div>
                        <div style={{display:"flex",gap:8,marginBottom:12}}>
                          {player?.bgImage && (
                            <button style={{...S.btnGhost,flex:1}} onClick={()=>updatePlayerBg(bgPickerFor,null)}>Rimuovi sfondo</button>
                          )}
                          <button style={{...S.btnGhost,flex:1}} onClick={fetchFullArtBackgrounds} disabled={loadingFullArt}>
                            {loadingFullArt?"⏳ Carico…":"🔀 Altre full-art"}
                          </button>
                        </div>
                        {fullArtOptions.length===0 && !loadingFullArt && (
                          <div style={{...S.empty,padding:20}}>Tocca "Altre full-art" per caricare la galleria.</div>
                        )}
                        <div style={S.miniGrid}>
                          {fullArtOptions.map(c=>(
                            <div key={c.id} style={S.miniTile} onClick={()=>updatePlayerBg(bgPickerFor,c.image)}>
                              <img src={c.image} alt={c.name} style={S.miniImg}/>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* ── ADVISOR ── */}
            {tab==="advisor" && (
              <div style={S.col} className="fade-in">
                <div style={{textAlign:"center",padding:"20px 0 8px"}}>
                  <div style={{fontSize:44,marginBottom:6}}>🤖</div>
                  <div style={{fontSize:22,fontWeight:800}}>AI Advisor</div>
                </div>

                {/* Mode selector */}
                <div style={{display:"flex",gap:8,background:"#12101a",borderRadius:10,padding:6,border:"1px solid #1e1b2e"}}>
                  {[["analyze","🔮 Analizza mazzo"],["build","⚡ Crea mazzo"]].map(([m,l])=>(
                    <button key={m} onClick={()=>{setAdvisorMode(m);setAdvisorResult(null);setBuildResult(null);}}
                      style={{flex:1,padding:"9px 0",borderRadius:7,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,
                        background:advisorMode===m?"#f59e0b":"transparent",color:advisorMode===m?"#0a0a0f":"#64748b"}}>
                      {l}
                    </button>
                  ))}
                </div>

                {/* ANALYZE MODE */}
                {advisorMode==="analyze" && (
                  <>
                    <div style={S.panel}>
                      <div style={S.pt}>Analizza e migliora un mazzo esistente</div>
                      <label style={S.lbl}>Mazzo da analizzare</label>
                      <select style={{...S.sel,width:"100%",marginBottom:16}} value={advisorDeck} onChange={e=>setAdvisorDeck(e.target.value)}>
                        <option value="">— Seleziona un mazzo —</option>
                        {data.decks.map(d=><option key={d.id} value={d.id}>{d.name} ({d.format})</option>)}
                      </select>
                      <label style={S.lbl}>Budget acquisti: <b style={{color:"#f59e0b"}}>€{budget}</b></label>
                      <input type="range" min="5" max="500" step="5" value={budget}
                        onChange={e=>setBudget(parseInt(e.target.value))}
                        style={{width:"100%",accentColor:"#f59e0b",margin:"6px 0 4px"}} />
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#64748b",marginBottom:16}}>
                        <span>€5</span><span>€100</span><span>€250</span><span>€500</span>
                      </div>
                      {data.decks.length===0 && <div style={{...S.empty,padding:"12px 0",marginBottom:12}}>Prima crea un mazzo nella sezione ⚔️ Mazzi</div>}
                      <button style={{...S.btnP,width:"100%",padding:13,fontSize:15}}
                        onClick={runAdvisor} disabled={!advisorDeck||advising}>
                        {advising?"⏳ Analisi in corso…":"🔮 Analizza e consiglia"}
                      </button>
                    </div>
                    {advisorResult && (
                      <div style={{...S.panel,borderColor:"#1a3a2a"}} className="fade-in">
                        <div style={{fontSize:13,fontWeight:700,color:"#34d399",marginBottom:14}}>📋 Analisi completata</div>
                        {renderAdvisor(advisorResult)}
                      </div>
                    )}
                  </>
                )}

                {/* BUILD MODE */}
                {advisorMode==="build" && (
                  <>
                    <div style={S.panel}>
                      <div style={S.pt}>Crea un mazzo dalle tue carte</div>
                      <label style={S.lbl}>Formato</label>
                      <select style={{...S.sel,width:"100%",marginBottom:14}} value={buildFormat} onChange={e=>setBuildFormat(e.target.value)}>
                        {FORMATS.map(f=><option key={f}>{f}</option>)}
                      </select>

                      <label style={S.lbl}>Stile di gioco</label>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                        {[["aggressivo","⚔️ Aggressivo"],["controllo","🛡️ Controllo"],["combo","💥 Combo"],["midrange","⚖️ Midrange"],["rampa","🌿 Rampa"],["personalizzato","✏️ Personalizzato"]].map(([v,l])=>(
                          <button key={v} onClick={()=>setDeckStyle(v)}
                            style={{padding:"8px 4px",borderRadius:7,border:`1px solid ${deckStyle===v?"#f59e0b":"#2d2b3e"}`,
                              background:deckStyle===v?"#1e1b2e":"transparent",color:deckStyle===v?"#f59e0b":"#94a3b8",
                              cursor:"pointer",fontSize:12,fontWeight:deckStyle===v?700:400}}>
                            {l}
                          </button>
                        ))}
                      </div>

                      {deckStyle==="personalizzato" && (
                        <textarea style={{...S.inp,width:"100%",minHeight:70,resize:"vertical",marginBottom:14}}
                          placeholder="Descrivi il tuo stile di mazzo ideale… (es. voglio un mazzo con molti zombi che sfrutta il cimitero)"
                          value={deckStyleDesc} onChange={e=>setDeckStyleDesc(e.target.value)} />
                      )}

                      <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>
                        Carte disponibili: <b style={{color:"#f8fafc"}}>{collection.length} titoli</b> · {collection.reduce((s,c)=>s+c.qty,0)} totali
                      </div>

                      {collection.length===0 && <div style={{...S.empty,padding:"12px 0",marginBottom:12}}>Aggiungi carte alla collezione prima</div>}
                      <button style={{...S.btnP,width:"100%",padding:13,fontSize:15}}
                        onClick={buildDeckFromCollection} disabled={collection.length===0||building}>
                        {building?"⏳ Costruzione mazzo in corso…":"⚡ Costruisci mazzo"}
                      </button>
                    </div>
                    {buildResult && (
                      <div style={{...S.panel,borderColor:"#1a3a2a"}} className="fade-in">
                        <div style={{fontSize:13,fontWeight:700,color:"#34d399",marginBottom:14}}>⚡ Mazzo costruito</div>
                        {renderAdvisor(buildResult)}
                        <button style={{...S.btnP,width:"100%",padding:12,marginTop:10}} onClick={()=>setShowSaveDeckPopup(true)}>
                          💾 Salva come mazzo
                        </button>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    // ── STYLES ───────────────────────────────────────────────

      psAvatarPick:{fontSize:22,background:"transparent",border:"2px solid transparent",borderRadius:8,padding:4,cursor:"pointer"},

      statL:{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginTop:2},

      tableExitBtn:{padding:12,background:"#1e1b2e",color:"#94a3b8",border:"none",borderTop:"1px solid #2d2b3e",fontSize:12,fontWeight:600},
      btnPrice:{display:"block",width:"100%",marginTop:6,padding:"7px",background:"#3a2e1e",color:"#f59e0b",border:"1px solid #92600e",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600},
      priceLink:{display:"block",padding:"10px 12px",background:"#0e0c16",borderRadius:8,color:"#e2e8f0",fontSize:13,fontWeight:600,textDecoration:"none",border:"1px solid #2d2b3e"},
      btnDel:{marginTop:6,padding:"6px 14px",background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:6,cursor:"pointer",fontSize:12},
      btnSm:{padding:"5px 10px",background:"#1e1b2e",border:"none",borderRadius:5,color:"#f8fafc",cursor:"pointer",fontSize:12},
      btnMini:{padding:"2px 8px",background:"#1e1b2e",border:"1px solid #2d2b3e",borderRadius:4,color:"#94a3b8",cursor:"pointer",fontSize:12},

      dMeta:{fontSize:11,color:"#94a3b8",marginBottom:3},
      legGrid:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,margin:"8px 0"},
      // View toggle (griglia/lista)
      viewToggle:{display:"flex",border:"1px solid #2d2b3e",borderRadius:7,overflow:"hidden",flexShrink:0},
      viewBtn:{padding:"8px 12px",background:"#0e0c16",border:"none",color:"#64748b",cursor:"pointer",fontSize:14,lineHeight:1},
      viewBtnOn:{background:"#f59e0b",color:"#0a0a0f"},
      pickerHeader:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"},
      warnPanel:{background:"#2a1414",border:"1px solid #7f1d1d",borderRadius:10,padding:12,marginBottom:14},
      // Lista compatta
      listWrap:{display:"flex",flexDirection:"column",gap:6},
      listRow:{display:"flex",alignItems:"center",gap:10,padding:8,background:"#12101a",border:"1px solid #1e1b2e",borderRadius:9,cursor:"pointer"},
      listThumb:{width:36,height:50,objectFit:"cover",borderRadius:4,flexShrink:0},
      listThumbPlaceholder:{width:36,height:50,background:"#1e1b2e",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0},
      listName:{fontSize:13,fontWeight:600,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"},
      listMeta:{fontSize:11,color:"#64748b",marginTop:2},
      listDetail:{background:"#1a1828",border:"1px solid #4a4570",borderRadius:10,padding:12,marginTop:4,marginBottom:2},
      // Mini card grid (usata nei pannelli mazzo)
      miniGrid:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8,maxHeight:400,overflowY:"auto"},
      miniTile:{background:"#0e0c16",border:"1px solid #1e1b2e",borderRadius:8,overflow:"hidden",position:"relative"},
      miniImg:{width:"100%",display:"block",borderRadius:"8px 8px 0 0"},
      miniNoImg:{padding:6,textAlign:"center",fontSize:9,color:"#64748b",background:"#1e1b2e",minHeight:60,display:"flex",alignItems:"center",justifyContent:"center"},
      miniQty:{position:"absolute",top:4,left:4,background:"rgba(10,10,15,.85)",color:"#f59e0b",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10},
      miniBtn:{width:"100%",padding:"4px 0",background:"#1e1b2e",border:"none",color:"#f8fafc",cursor:"pointer",fontSize:13},
      // Decks
      deckGrid:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:12},
      deckCard:{background:"#12101a",border:"1px solid #1e1b2e",borderRadius:10,padding:16},
      builder:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14},
      pickItem:{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:"#0e0c16",borderRadius:6},
      // Modal
      modalOverlay:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16},
      modalBox:{background:"#12101a",border:"1px solid #2d2b3e",borderRadius:14,padding:20,width:"100%",maxWidth:420},
      modalHeader:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},
      divider:{textAlign:"center",position:"relative",margin:"4px 0",color:"#4a4570",fontSize:12},
      // Autocomplete
      suggBox:{position:"absolute",top:"100%",left:0,right:40,background:"#1a1828",border:"1px solid #4a4570",borderRadius:8,zIndex:300,boxShadow:"0 8px 24px rgba(0,0,0,.7)",marginTop:4,overflow:"hidden"},
      suggItem:{padding:"10px 14px",fontSize:13,cursor:"pointer",borderBottom:"1px solid #1e1b2e",color:"#e2e8f0"},
      // Search results
      resultRow:{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#0e0c16",borderRadius:8,cursor:"pointer",border:"1px solid #1e1b2e"},
      resultImg:{width:44,height:62,objectFit:"cover",borderRadius:5,flexShrink:0},
      resultImgPlaceholder:{width:44,height:62,background:"#1e1b2e",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0},
      // Quantity controls
      qtyRow:{display:"flex",alignItems:"center",gap:6},
      qtyBtn:{width:24,height:24,background:"#1e1b2e",border:"1px solid #2d2b3e",borderRadius:5,color:"#f8fafc",cursor:"pointer",fontSize:14,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"},
      qtyCnt:{fontSize:13,fontWeight:700,minWidth:20,textAlign:"center"},
      // Advisor
      aH2:{fontSize:13,fontWeight:700,color:"#f59e0b",margin:"12px 0 5px"},
      aLi:{fontSize:12,color:"#cbd5e1",padding:"3px 0 3px 10px",borderLeft:"2px solid #1e3a2e",margin:"3px 0"},
      aP:{fontSize:12,color:"#94a3b8",lineHeight:1.6,margin:"3px 0"},
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
